name: Deploy Skinstudio to Firebase (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
      VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
      VITE_EMAILJS_CONFIRM_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_CONFIRM_TEMPLATE_ID }}
      VITE_EMAILJS_REMINDER_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_REMINDER_TEMPLATE_ID }}
      VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
      VITE_INSTAGRAM_URL: ${{ secrets.VITE_INSTAGRAM_URL }}
      VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install and Build
        working-directory: Skinstudio/salon-system
        run: npm ci && npm run build

      - name: Install Functions dependencies
        working-directory: Skinstudio/salon-system/functions
        run: npm ci

      - name: Create Functions .env
        working-directory: Skinstudio/salon-system/functions
        run: |
          cat > .env <<EOL
          ADMIN_PASSWORD=${{ secrets.VITE_ADMIN_PASSWORD }}
          BULKGATE_APPLICATION_ID=${{ secrets.BULKGATE_APPLICATION_ID }}
          BULKGATE_APPLICATION_TOKEN=${{ secrets.BULKGATE_APPLICATION_TOKEN }}
          BULKGATE_SENDER_ID=${{ secrets.BULKGATE_SENDER_ID }}
          BULKGATE_SENDER_ID_VALUE=${{ secrets.BULKGATE_SENDER_ID_VALUE }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          EOL

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TM_RESERVATIONS }}

      - name: Deploy Hosting
        working-directory: Skinstudio/salon-system
        run: npx firebase-tools deploy --only hosting --project tm-reservations --non-interactive

      - name: Deploy Functions
        working-directory: Skinstudio/salon-system
        run: npx firebase-tools deploy --only functions --project tm-reservations --non-interactive
